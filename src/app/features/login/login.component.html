<div class="login-wrapper">
  <div class="login-card">
    <header class="brand">
      <h1 class="logo">NutriFlow</h1>
      <p class="tagline">Seu plano alimentar, sempre com você.</p>
    </header>

    <div class="auth-section">
      <div #googleSignInButton class="google-btn"></div>
      <p class="helper-text">Utilize sua conta Google para acessar sua dieta personalizada.</p>
    </div>

    @if (isLoading) {
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span>Entrando...</span>
      </div>
    }

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }
  </div>
</div>
